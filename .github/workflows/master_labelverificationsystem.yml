name: Build and deploy ASP.Net Core Frontend to Azure Web App - LabelVerificationSystem

on:
  push:
    branches:
      - main   # Ajusta si tu repo usa 'master'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'   # LTS y soportado en App Service

      - name: Build with dotnet
        run: dotnet build ./source/Frontend/LabelVerificationSystem.Frontend.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish ./source/Frontend/LabelVerificationSystem.Frontend.csproj -c Release -o ./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: ./publish

  deploy:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'LabelVerificationSystem'
          slot-name: 'Production'
          package: ./publish
