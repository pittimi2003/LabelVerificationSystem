name: Build and deploy ASP.Net Core API to Azure Web App - LabelVerificationSystemApi

on:
  push:
    branches:
      - main   # Ajusta si tu repo usa 'master'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build API project
        run: dotnet build ./source/Backend/LabelVerificationSystem.Backend.csproj --configuration Release

      - name: dotnet publish API
        run: dotnet publish ./source/Backend/LabelVerificationSystem.Backend.csproj -c Release -o ./publish-api

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: api-app
          path: ./publish-api

  deploy:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: api-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_API }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_API }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_API }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'LabelVerificationSystemApi'
          slot-name: 'Production'
          package: ./publish-api
